server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # Fallback SPA: cualquier ruta desconocida sirve index.html para que
    # go_router (rutas por URL en web) resuelva del lado cliente.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache largo para assets versionados; index.html nunca se cachea para que
    # un nuevo deploy se vea de inmediato.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
